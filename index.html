<!DOCTYPE html>
<html>
<head>
    <title>Circle</title>
    <style>
        #my-circle {
            /* 4秒かけて無限にアニメーションを繰り返します */
            animation: color-change 4s infinite;
        }

        @keyframes color-change {
            /* アニメーションの開始時（0%）と終了時（100%）は青色 */
            0% {
                fill: blue;
            }
            /* アニメーションの中間（50%）で赤色に変化 */
            50% {
                fill: red;
            }
            /* 終了時に再び青色に戻ります */
            100% {
                fill: blue;
            }
        }
    </style>
</head>
<body>
    <h1>Circle Image</h1>
    <svg width="450" height="100">
        <circle id="my-circle" cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="blue" />
        <rect id="my-rectangle" x="110" y="10" width="40" height="40" fill="green" />
    </svg>
    
    <div style="position: relative; height: 40px; margin-top: 5px;">
        <button id="toggle-button" style="position: absolute; left: 25px;">Stop</button>
        <button id="upload-button" style="position: absolute; left: 110px;">Upload</button>
    </div>

    <script>
        const circle = document.getElementById('my-circle');
        const rectangle = document.getElementById('my-rectangle');
        const button = document.getElementById('toggle-button');
        const uploadButton = document.getElementById('upload-button');

        // テキスト要素を作成し、SVGに追加します
        const svg = document.querySelector('svg');
        svg.setAttribute('width', '450'); // Increase width to fit formatted timestamp
        const textElement = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        textElement.setAttribute('x', 110);
        textElement.setAttribute('y', 75);
        textElement.setAttribute('fill', 'black');
        textElement.textContent = 'Fetching data...'; // Initial text
        svg.appendChild(textElement);

        // --- Circle Animation Control ---
        let isAnimating = true;
        button.addEventListener('click', () => {
            if (isAnimating) {
                circle.style.animationPlayState = 'paused';
                button.textContent = 'Start';
            } else {
                circle.style.animationPlayState = 'running';
                button.textContent = 'Stop';
            }
            isAnimating = !isAnimating;
        });
        
        // --- Text Data Fetching Control ---
        let isFetching = true;
        uploadButton.textContent = 'Stop'; // Set initial text

        uploadButton.addEventListener('click', () => {
            if (isFetching) {
                uploadButton.textContent = 'Start';
            } else {
                uploadButton.textContent = 'Stop';
            }
            isFetching = !isFetching;
        });

        // 1秒ごとに実行されるタイマーで色データを取得し、表示します
        setInterval(() => {
            if (isFetching) {
                fetch('/api/color_data')
                    .then(response => response.json())
                    .then(data => {
                        // 'data' will be like { color: '#abcdef', timestamp: 12345.678 }
                        const timestamp = data.timestamp;

                        // Update rectangle color
                        rectangle.setAttribute('fill', data.color);

                        // Convert UNIX timestamp (seconds) to a readable format
                        // Note: JavaScript Date constructor expects milliseconds, so we multiply by 1000
                        const date = new Date(timestamp * 1000);
                        const year = date.getFullYear();
                        const month = (date.getMonth() + 1).toString().padStart(2, '0');
                        const day = date.getDate().toString().padStart(2, '0');
                        const hours = date.getHours().toString().padStart(2, '0');
                        const minutes = date.getMinutes().toString().padStart(2, '0');
                        const seconds = date.getSeconds().toString().padStart(2, '0');

                        const formattedDate = `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;

                        textElement.textContent = `${data.color} ${formattedDate}`;
                    })
                    .catch(error => {
                        console.error('Error fetching color data:', error);
                        textElement.textContent = 'Error!';
                    });
            }
        }, 1000); // 1000ミリ秒 = 1秒

    </script>
</body>
</html>
